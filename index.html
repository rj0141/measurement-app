<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Body Scanner Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body { margin: 0; background: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    /* Top 70% - Video Section */
    #video-section { position: relative; height: 70vh; width: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    video, canvas { position: absolute; height: 100%; width: 100%; object-fit: cover; }
    .mirrored { transform: scaleX(-1); }

    /* Bottom 30% - UI Section */
    #ui-section { height: 30vh; width: 100%; background: #1a1a1a; border-top: 2px solid #00FFAA; display: flex; flex-direction: column; overflow-y: auto; padding: 15px; box-sizing: border-box; }
    
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .height-input-container { display: flex; align-items: center; gap: 10px; }
    input { background: #333; border: 1px solid #444; color: #00FFAA; padding: 8px; border-radius: 5px; width: 60px; font-size: 16px; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .stat-card { background: #222; padding: 10px; border-radius: 8px; border-left: 3px solid #00FFAA; }
    .stat-label { font-size: 11px; color: #888; text-transform: uppercase; }
    .stat-val { font-size: 18px; font-weight: bold; color: #fff; display: block; margin-top: 4px; }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 20px; }
    button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; }
    .btn-capture { background: #00FFAA; color: #000; }
    .btn-switch { background: #333; color: #fff; }
    .btn-resume { background: #ffcc00; color: #000; display: none; }

    #status-overlay { position: absolute; top: 20px; width: 80%; left: 10%; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 20px; text-align: center; color: #00FFAA; font-weight: bold; z-index: 100; pointer-events: none; border: 1px solid #00FFAA; }
  </style>
</head>
<body>

<div id="video-section">
  <div id="status-overlay">Position yourself in the frame</div>
  <video id="input_video" autoplay playsinline></video>
  <canvas id="output_canvas"></canvas>
</div>

<div id="ui-section">
  <div class="header-row">
    <div class="height-input-container">
      <label style="font-size: 12px; color: #888;">HEIGHT (CM):</label>
      <input type="number" id="userHeight" value="165">
    </div>
    <span id="timer-text" style="color: #ff4c4c; font-size: 12px; font-weight: bold;"></span>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><span class="stat-label">Shoulders</span><span id="out-shoulder" class="stat-val">--</span></div>
    <div class="stat-card"><span class="stat-label">Bust</span><span id="out-bust" class="stat-val">--</span></div>
    <div class="stat-card"><span class="stat-label">Waist</span><span id="out-waist" class="stat-val">--</span></div>
    <div class="stat-card"><span class="stat-label">Hips</span><span id="out-hips" class="stat-val">--</span></div>
  </div>

  <div class="controls">
    <button id="capture-btn" class="btn-capture" onclick="captureData()">Capture & Copy</button>
    <button id="resume-btn" class="btn-resume" onclick="resumeScanning()">Resume Scan</button>
    <button class="btn-switch" onclick="toggleCamera()">Switch Cam</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
