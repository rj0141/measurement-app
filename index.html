<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Women's Clothing Scanner Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body { margin: 0; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; color: white; display: flex; height: 100vh; overflow: hidden; }
    
    #container { 
      position: relative; 
      flex-grow: 1; 
      background: #000; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      padding: 20px;
    }
    video, canvas { 
      position: absolute; 
      max-width: 95%; 
      max-height: 95%; 
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0,255,170,0.2);
      object-fit: contain; 
    }
    
    /* Mirror effect only for front camera - handled in JS now */
    .mirrored { transform: scaleX(-1); }

    #sidebar { width: 350px; padding: 30px; background: #151515; border-left: 1px solid #333; overflow-y: auto; z-index: 10; }
    .input-group { margin-bottom: 25px; }
    label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; font-weight: bold; }
    input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; border-radius: 6px; color: #00FFAA; font-size: 18px; margin-top: 8px; box-sizing: border-box; }
    
    .stats { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; }
    .m-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
    .label-text { color: #ccc; font-size: 15px; }
    .val { color: #00FFAA; font-weight: 700; font-size: 1.3em; font-family: monospace; }
    
    .btn-primary { width: 100%; padding: 16px; background: #00FFAA; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; font-size: 16px; margin-bottom: 10px; }
    .btn-secondary { width: 100%; padding: 12px; background: #333; color: #fff; border: 1px solid #444; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.2s; font-size: 14px; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    
    .tip { font-size: 12px; color: #666; line-height: 1.5; margin-top: 20px; background: #111; padding: 10px; border-radius: 4px; }
  </style>
</head>
<body>

<div id="container">
  <video id="input_video" autoplay playsinline></video>
  <canvas id="output_canvas"></canvas>
</div>

<div id="sidebar">
  <h2 style="margin-top:0; color: #00FFAA; letter-spacing: -1px;">AI Body Scanner</h2>
  
  <div class="input-group">
    <label>User Height (cm)</label>
    <input type="number" id="userHeight" value="165" oninput="updateHeight()">
  </div>

  <div class="stats">
    <div class="m-row"><span class="label-text">Shoulders</span> <span id="out-shoulder" class="val">--</span></div>
    <div class="m-row"><span class="label-text">Bust Girth</span> <span id="out-bust" class="val">--</span></div>
    <div class="m-row"><span class="label-text">Waist Girth</span> <span id="out-waist" class="val">--</span></div>
    <div class="m-row"><span class="label-text">Hip Girth</span> <span id="out-hips" class="val">--</span></div>
  </div>

  <button class="btn-primary" onclick="copyToClipboard()">Copy for Google Sheets</button>
  <button class="btn-secondary" onclick="toggleCamera()">🔄 Switch Camera</button>
  
  <div class="tip">
    <strong>Scanner Tips:</strong><br>
    • Stand so your full body is visible.<br>
    • If using the <strong>Back Camera</strong>, you can use the 0.5x Ultra-Wide lens for smaller rooms.
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
