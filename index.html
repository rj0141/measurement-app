<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaPipe Pose Demo</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js"></script>

  <style>
    body { margin: 0; background: #111; display: flex; justify-content: center; }
    #videoElement {
      transform: scaleX(-1);
      width: 100vw;
      height: auto;
    }
    canvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 100vw;
      height: auto;
      pointer-events: none;
      transform: scaleX(-1);
    }
    #errorBox {
      position: absolute;
      top: 20px;
      color: #ff4444;
      font-size: 22px;
      font-family: sans-serif;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>
<body>

  <div id="errorBox"></div>

  <video id="videoElement" autoplay playsinline></video>
  <canvas id="outputCanvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
