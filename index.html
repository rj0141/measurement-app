<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Body Scanner Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body { margin: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
    #video-container { position: relative; width: 100vw; height: 100vh; background: #000; }
    video, canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; }
    .mirrored { transform: scaleX(-1); }

    .top-bar { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 100; gap: 8px; }
    .glass-btn { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 255, 170, 0.5); color: white; padding: 10px; border-radius: 8px; font-weight: bold; backdrop-filter: blur(5px); font-size: 12px; }
    .height-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 8px; border: 1px solid #444; backdrop-filter: blur(5px); }
    .height-box input { width: 45px; background: transparent; border: none; color: #00FFAA; font-weight: bold; font-size: 16px; outline: none; }

    #status-overlay { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,255,170,0.2); padding: 8px 20px; border-radius: 20px; border: 1px solid #00FFAA; color: #00FFAA; font-size: 11px; font-weight: bold; z-index: 90; text-align: center; text-transform: uppercase; }

    #measurements-overlay { position: absolute; bottom: 120px; left: 15px; right: 15px; background: rgba(0,0,0,0.7); border-radius: 15px; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; backdrop-filter: blur(10px); border: 1px solid #333; pointer-events: none; }
    .m-item { display: flex; flex-direction: column; }
    .m-label { font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .m-val { font-size: 18px; color: #00FFAA; font-weight: bold; font-family: monospace; }
    .unit-label { font-size: 10px; margin-left: 4px; color: #666; }

    .capture-ring { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 72px; height: 72px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; background: transparent; cursor: pointer; z-index: 100; }
    .capture-inner { width: 58px; height: 58px; border-radius: 50%; background: #00FFAA; transition: 0.2s; }
    .capture-ring:active .capture-inner { transform: scale(0.85); background: #ff4c4c; }
    
    #resume-btn { position: absolute; bottom: 45px; right: 20px; background: #ffcc00; color: #000; padding: 12px 24px; border-radius: 25px; font-weight: bold; border: none; display: none; z-index: 101; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
  </style>
</head>
<body>

<div id="video-container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div class="top-bar">
        <div class="height-box">
            <input type="number" id="userHeight" value="165" oninput="updateHeight()">
            <span id="height-unit-text" style="font-size: 10px; color: #ccc; font-weight: bold;">CM</span>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="glass-btn" onclick="toggleUnits()" id="unit-toggle-btn">UNIT: CM</button>
            <button class="glass-btn" onclick="toggleCamera()">🔄 FLIP</button>
        </div>
    </div>

    <div id="status-overlay">Aligning AI...</div>

    <div id="measurements-overlay">
        <div class="m-item"><span class="m-label">Shoulders</span><span><span id="out-shoulder" class="m-val">--</span><span class="unit-text unit-label">cm</span></span></div>
        <div class="m-item"><span class="m-label">Bust Girth</span><span><span id="out-bust" class="m-val">--</span><span class="unit-text unit-label">cm</span></span></div>
        <div class="m-item"><span class="m-label">Waist Girth</span><span><span id="out-waist" class="m-val">--</span><span class="unit-text unit-label">cm</span></span></div>
        <div class="m-item"><span class="m-label">Hip Girth</span><span><span id="out-hips" class="m-val">--</span><span class="unit-text unit-label">cm</span></span></div>
    </div>

    <button id="resume-btn" onclick="resumeScanning()">RESUME</button>

    <div class="capture-ring" id="capture-btn" onclick="captureData()">
        <div class="capture-inner"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
