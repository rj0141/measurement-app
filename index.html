<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Body Scanner - Pro</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; width: 100%; position: fixed; overflow: hidden; }
    #video-container { position: relative; width: 100vw; height: 100vh; }
    video, canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; }
    .mirrored { transform: scaleX(-1); }

    /* Mandatory Height Overlay */
    #start-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #0a0a0a; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .input-card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 80%; max-width: 300px; }
    .start-btn { width: 100%; background: #00FFAA; color: black; padding: 15px; border-radius: 12px; font-weight: bold; border: none; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
    .start-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
    
    #setupHeight { width: 80px; background: #222; border: 2px solid #444; border-radius: 8px; color: #00FFAA; font-size: 24px; text-align: center; padding: 10px; margin: 10px 0; outline: none; }
    #setupHeight:focus { border-color: #00FFAA; }

    /* Top Bar & UI Controls */
    .top-bar { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 100; pointer-events: none; }
    .controls-wrap { display: flex; gap: 10px; pointer-events: auto; }
    .glass-box { background: rgba(0, 0, 0, 0.8); border: 1px solid #444; color: white; padding: 10px; border-radius: 12px; backdrop-filter: blur(8px); display: flex; align-items: center; gap: 8px; pointer-events: auto; }
    .glass-box input { width: 45px; background: transparent; border: none; color: #00FFAA; font-weight: bold; font-size: 16px; outline: none; }
    .glass-btn { background: rgba(0, 0, 0, 0.8); border: 1px solid #444; color: white; padding: 10px 15px; border-radius: 12px; font-weight: bold; font-size: 11px; cursor: pointer; }

    #status-overlay { position: absolute; top: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,255,170,0.15); padding: 8px 25px; border-radius: 25px; border: 1px solid #00FFAA; color: #00FFAA; font-size: 11px; font-weight: bold; z-index: 90; letter-spacing: 1px; }

    #measurements-overlay { position: absolute; bottom: 130px; left: 15px; right: 15px; background: rgba(0,0,0,0.85); border-radius: 20px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border: 1px solid #333; pointer-events: none; }
    .m-item { display: flex; flex-direction: column; }
    .m-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
    .m-val { font-size: 22px; color: #00FFAA; font-weight: bold; font-family: monospace; }
    .unit-txt { font-size: 11px; color: #555; margin-left: 4px; }

    .capture-ring { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; background: transparent; cursor: pointer; z-index: 100; }
    .capture-inner { width: 60px; height: 60px; border-radius: 50%; background: #00FFAA; }
    #resume-btn { position: absolute; bottom: 50px; right: 20px; background: #ffcc00; color: #000; padding: 14px 28px; border-radius: 30px; font-weight: bold; border: none; display: none; z-index: 101; }
  </style>
</head>
<body>

<div id="start-overlay">
    <div class="input-card">
        <h2 style="color: #00FFAA; margin: 0 0 10px 0;">Setup Scan</h2>
        <p style="color: #888; font-size: 13px;">Enter your height to enable the AI scanner</p>
        
        <input type="number" id="setupHeight" placeholder="--" oninput="validateHeight()">
        <div style="color: #00FFAA; font-weight: bold; font-size: 14px;" id="setupUnitLabel">INCHES</div>
        
        <button id="activate-btn" class="start-btn" onclick="initApp()" disabled>ACTIVATE CAMERA</button>
    </div>
</div>

<div id="video-container">
    <video id="input_video" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>

    <div class="top-bar">
        <div class="glass-box">
            <span style="font-size: 10px; color: #888;">HT:</span>
            <input type="number" id="userHeight" value="" step="0.1">
            <span id="topUnitLabel" style="font-size: 11px; color: #888;">IN</span>
        </div>
        <div class="controls-wrap">
            <button class="glass-btn" onclick="toggleUnits()" id="unit-btn">UNIT: IN</button>
            <button class="glass-btn" onclick="toggleCamera()">🔄 FLIP</button>
        </div>
    </div>

    <div id="status-overlay">WAITING FOR START</div>
